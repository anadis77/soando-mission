<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>소안도 선교 · 관리자</title>
<style>
:root{--bg:#F4F8FB;--card:#fff;--cor:#E8604F;--line:#DCE7EE;--line2:#EBF1F5;--nvy:#2F5F96;--sea:#1490B5;--sky:#2AA9E1;--tx:#0F2A38;--tx2:#4A6B7C;--tx3:#8AA3B0;--r:14px;--r2:11px;--sh:0 1px 3px rgba(15,42,56,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;padding:0 0 60px}
.top{background:var(--card);border-bottom:1px solid var(--line);padding:16px 20px;position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between}
.top h1{font-size:16px;font-weight:800;letter-spacing:-.3px}
.top .badge{font-size:11px;color:#fff;background:var(--nvy);padding:4px 10px;border-radius:20px;font-weight:700}
.wrap{max-width:920px;margin:0 auto;padding:20px}
/* gate */
.gate{max-width:380px;margin:60px auto;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:28px 24px;box-shadow:var(--sh);text-align:center}
.gate .lock{width:52px;height:52px;border-radius:50%;background:#EAF4FA;color:var(--sea);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.gate h2{font-size:17px;font-weight:800;margin-bottom:6px}
.gate p{font-size:12.5px;color:var(--tx3);margin-bottom:20px;line-height:1.6}
.gate input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:var(--r2);font-size:14px;margin-bottom:12px;outline:none}
.gate input:focus{border-color:var(--sky)}
.gate button{width:100%;padding:12px;border:none;border-radius:var(--r2);background:var(--sea);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.gate button:disabled{opacity:.55;cursor:default}
.gate .err{color:var(--cor);font-size:12px;min-height:16px;margin-bottom:8px}
/* gallery */
.bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.bar .cnt{font-size:13px;color:var(--tx2)}
.bar .cnt b{color:var(--tx)}
.bar .refresh{font-size:12px;color:var(--sea);background:none;border:1px solid var(--line);padding:7px 12px;border-radius:20px;cursor:pointer}
.church{margin-bottom:26px}
.church h3{font-size:14px;font-weight:800;margin-bottom:10px;padding-left:2px}
.church h3 span{font-size:12px;color:var(--tx3);font-weight:600;margin-left:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.cell{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh)}
.cell .img{aspect-ratio:1;background-size:cover;background-position:center;background-color:#eaf1f6}
.cell .meta{padding:8px 10px}
.cell .m-t{font-size:12px;font-weight:700}
.cell .m-s{font-size:11px;color:var(--tx3);margin-top:2px}
.cell .del{position:absolute;top:7px;right:7px;width:28px;height:28px;border:none;border-radius:50%;background:rgba(20,28,38,.6);color:#fff;font-size:17px;line-height:28px;text-align:center;cursor:pointer}
.cell .del:hover{background:rgba(214,52,52,.95)}
.empty{text-align:center;color:var(--tx3);font-size:13px;padding:50px 0}
.hidden{display:none}
</style>
</head>
<body>

<div class="top">
  <h1>소안도 선교 · 사진 관리</h1>
  <span class="badge">관리자</span>
</div>

<!-- 비밀번호 게이트 -->
<div id="gate" class="gate">
  <div class="lock">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div>
  <h2>관리자 확인</h2>
  <p>사진을 관리하려면 관리자 비밀번호를 입력하세요.</p>
  <p class="err" id="gate-err"></p>
  <input type="password" id="pw" placeholder="비밀번호" autocomplete="current-password">
  <button id="gate-btn" onclick="unlock()">확인</button>
</div>

<!-- 갤러리 -->
<div id="app" class="wrap hidden">
  <div class="bar">
    <span class="cnt">전체 <b id="total">0</b>장</span>
    <button class="refresh" onclick="load()">새로고침</button>
  </div>
  <div id="list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPA_URL="https://ifnxmbzucxgblkrvswva.supabase.co";
const SUPA_KEY="sb_publishable_THP8kNiA3OvDU7wCEgeJsQ__lvwXWYn";
const BUCKET="mission-photos";
const FN=SUPA_URL+"/functions/v1/delete-photo";
const COLS="id,church_id,ministry_type,caption,storage_path,created_at";
const CH=[
 {id:"east",n:"소안동부교회"},{id:"bija",n:"비자리교회"},{id:"central",n:"소안중앙교회"},
 {id:"mira",n:"소안미라교회"},{id:"antioch",n:"부상안디옥교회"}
];
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);
const $=id=>document.getElementById(id);
let PW="";

async function apiVerify(token){
 const r=await fetch(FN,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({verify:true,token})});
 return r.ok;
}
async function apiDelete(id,token){
 const r=await fetch(FN,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id,token})});
 const j=await r.json().catch(()=>({}));
 if(!r.ok)throw new Error(j.error||("삭제 실패("+r.status+")"));
 return j;
}

async function unlock(){
 const pw=$("pw").value.trim();
 if(!pw){$("gate-err").textContent="비밀번호를 입력하세요";return}
 const btn=$("gate-btn");btn.disabled=true;btn.textContent="확인 중...";
 $("gate-err").textContent="";
 try{
  const ok=await apiVerify(pw);
  if(!ok){$("gate-err").textContent="비밀번호가 올바르지 않습니다";return}
  PW=pw;
  $("gate").classList.add("hidden");
  $("app").classList.remove("hidden");
  await load();
 }catch(e){$("gate-err").textContent="연결 문제가 생겼어요. 다시 시도해주세요";}
 finally{btn.disabled=false;btn.textContent="확인";}
}
$("pw").addEventListener("keydown",e=>{if(e.key==="Enter")unlock();});

async function load(){
 const{data,error}=await sb.from("photos").select(COLS).order("created_at",{ascending:false});
 if(error){$("list").innerHTML=`<p class="empty">목록을 불러오지 못했어요.</p>`;return}
 $("total").textContent=data.length;
 if(!data.length){$("list").innerHTML=`<p class="empty">아직 올라온 사진이 없습니다.</p>`;return}
 const byCh={};data.forEach(p=>{(byCh[p.church_id]=byCh[p.church_id]||[]).push(p);});
 let html="";
 CH.forEach(c=>{
  const arr=byCh[c.id];if(!arr||!arr.length)return;
  html+=`<div class="church"><h3>${c.n}<span>${arr.length}장</span></h3><div class="grid">`+
   arr.map(p=>{
    const url=sb.storage.from(BUCKET).getPublicUrl(p.storage_path).data.publicUrl;
    const d=new Date(p.created_at);
    const cap=p.caption?` · ${p.caption}`:"";
    return `<div class="cell">
      <button class="del" title="삭제" onclick="del('${p.id}')">×</button>
      <div class="img" style="background-image:url(${url})"></div>
      <div class="meta"><p class="m-t">${p.ministry_type}</p><p class="m-s">${d.getMonth()+1}. ${d.getDate()}${cap}</p></div>
    </div>`;
   }).join("")+`</div></div>`;
 });
 $("list").innerHTML=html;
}

async function del(id){
 if(!confirm("이 사진을 삭제할까요? 되돌릴 수 없어요."))return;
 try{await apiDelete(id,PW);await load();}
 catch(e){alert("삭제 중 문제가 생겼어요: "+e.message);}
}
</script>
</body>
</html>
